# Kanonische Kopie: siehe /render.yaml im Repo-Root (Blueprint findet die dort leichter).
# Secrets: GROQ_API_KEY im Render Dashboard setzen.

services:
  - type: web
    name: isaac-free
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile.free
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: ISAAC_FREE_CLOUD
        value: "1"
      - key: ISAAC_UNIFIED_PORT
        value: "1"
      - key: ISAAC_BIND_HOST
        value: "0.0.0.0"
      - key: ISAAC_DISABLE_VECTOR_MEMORY
        value: "1"
      - key: ACTIVE_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
