# Isaac CI — mirrors local validation from AGENTS.md
# py_compile → sanity_check.py → unittest (not pytest)

name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  ISAAC_DISABLE_VECTOR_MEMORY: "1"

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Codespaces image is 3.12; keep 3.11 for slightly older runners
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Compile core modules
        run: |
          python -m py_compile \
            isaac_core.py executor.py low_complexity.py memory.py \
            relay.py logic.py watchdog.py task_checkpoint.py

      - name: Sanity check
        run: python sanity_check.py

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run test suite
        run: |
          python -m unittest \
            tests_phase_a_stabilization \
            tests_state_io \
            tests_provider_configuration

      - name: Run eval harness
        run: python -m evals.eval_runner
        continue-on-error: false